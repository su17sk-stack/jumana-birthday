<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>وضحه 💕</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: Arial;
  cursor:pointer;
  background: radial-gradient(circle at top,#2c003e,#1a0028,#0f001a,#000000);
  color:white;
  transition: background 1.5s;
}

/* نجوم */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.6;
  animation: twinkle 3s infinite ease-in-out;
}
@keyframes twinkle{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* الهدية */
#gift{
  width:180px;
  height:180px;
  background:linear-gradient(45deg,#ff4d6d,#c9184a);
  border-radius:15px;
  position:relative;
  box-shadow:0 0 40px rgba(255,0,120,0.6);
}
#gift:before{
  content:"";
  position:absolute;
  width:25px;
  height:180px;
  background:white;
  left:77px;
}
#gift:after{
  content:"";
  position:absolute;
  height:25px;
  width:180px;
  background:white;
  top:77px;
}

/* النص */
#container{
  display:none;
  width:85%;
  max-width:900px;
  padding:40px;
  text-align:center;
  font-size:20px;
  line-height:2;
  border-radius:20px;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 40px rgba(255,255,255,0.1);
  animation:fadeIn 0.8s;
}
@keyframes fadeIn{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

/* قلوب */
.heart{
  position:absolute;
  bottom:-20px;
  font-size:20px;
  animation: floatUp 6s linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-110vh);opacity:0}
}

/* نهاية */
.final-line{
  margin-top:25px;
  font-size:23px;
  animation: glowText 2s infinite alternate;
}
@keyframes glowText{
  from{opacity:0.6;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div id="gift" onclick="openGift(event)"></div>
<div id="container"></div>

<script>

/* نجوم */
for(let i=0;i<120;i++){
  let star=document.createElement("div");
  star.className="star";
  star.style.top=Math.random()*100+"vh";
  star.style.left=Math.random()*100+"vw";
  star.style.animationDuration=(2+Math.random()*3)+"s";
  document.body.appendChild(star);
}

let texts=[

"💕 وضحه 💕",

"تدرين؟ وجودج بحياتي مو شي عادي… وجودج فرق.",

"مو كل الناس يمرون ويتركون أثر… بس انتي خليتي أثر ما يروح.",

"أحبج بطريقة هادية، بس عميقة… بدون ضجيج، بس توصل للقلب.",

"إذا ضحكتي… أحس الدنيا صارت أخف، وإذا سكتي… أفكر فيج أكثر.",

"أحبج لأنج انتي… مو لأن في سبب، بس لأن قلبي اختارج.",

"أبي أكون الشخص اللي ترتاحين له، بدون ما تحتاجين تشرحـين.",

"أبي أكون معاج بكل شي… بالفرح، بالتعب، وحتى بالصمت.",

"لو خيروني بين ألف شي وبينج… أختارج بدون تفكير.",

"وجودج بحياتي خلاني أفهم شنو يعني حب حقيقي.",

"وآخر شي…<br><br>لو الزمن رجع فيني ألف مرة… كل مرة أختارج 💖"
];

let index=0;
let opened=false;

function openGift(e){
  e.stopPropagation();
  document.getElementById("gift").style.display="none";
  document.getElementById("container").style.display="block";
  opened=true;
  showText();
  startHearts();
  explosion(60);
}

function showText(){
  let container=document.getElementById("container");
  container.innerHTML=texts[index];

  if(index===texts.length-1){
    cinematicEnding();
  }
}

function nextText(){
  if(opened && index<texts.length-1){
    index++;
    showText();
  }
}

document.body.addEventListener("click",nextText);

/* قلوب */
function startHearts(){
  setInterval(()=>{
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💗";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*25)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove()},6000);
  },600);
}

/* انفجار */
function explosion(amount){
  for(let i=0;i<amount;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=50+"vw";
    heart.style.fontSize="30px";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove()},2000);
  }
}

/* نهاية سينمائية */
function cinematicEnding(){
  explosion(120);

  let final=document.createElement("div");
  final.className="final-line";
  final.innerHTML="✨ لأن بعض الأشخاص… مو بس حب… يكونون راحة ✨";
  document.getElementById("container").appendChild(final);
}

</script>

</body>
</html>
